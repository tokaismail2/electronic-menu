version: "3.9"

services:
  # MongoDB Database
  mongodb:
    image: mongo:7.0
    container_name: investing-mongodb
    restart: unless-stopped
    ports:
      - "27101:27017"  # Host 27018 → Container 27017
    environment:
      MONGO_INITDB_ROOT_USERNAME: CGTECH123dd12kd
      MONGO_INITDB_ROOT_PASSWORD: CgTech123ddd2kd
      MONGO_INITDB_DATABASE: investing
    volumes:
      - mongodb_data:/data/db
      - ./mongo-init:/docker-entrypoint-initdb.d
    networks:
      - investing-network

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: investing-redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - "6382:6379"  # Host 6382 → Container 6379
    networks:
      - investing-network

  # Node.js Application
  app:
    build:
      context: .
      dockerfile: Dockerfile
